<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css"> <!-- Link to CSS for styling -->
    <title>ATS Workflow Presentation</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .slide { display: none; }
        .active { display: block; }
        .controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); }
        .button { background-color: #4CAF50; color: white; border: none; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="presentation">
        <div id="slide1" class="slide active">
            <h1>ATS Workflow Presentation</h1>
            <p>Overview of our ATS Workflow</p>
        </div>
        <div id="slide2" class="slide">
            <h1>Overview</h1>
            <p>This slide provides an overview of the ATS.</p>
        </div>
        <div id="slide3" class="slide">
            <h1>Process Flow</h1>
            <p>Diagram of the process flow...</p>
        </div>
        <div id="slide4" class="slide">
            <h1>Kanban Board</h1>
            <p>Currently in progress tasks...</p>
        </div>
        <div id="slide5" class="slide">
            <h1>Analytics</h1>
            <p>Statistics and analytics data.</p>
        </div>
        <div id="slide6" class="slide">
            <h1>Metrics</h1>
            <p>Key metrics and performance indicators.</p>
        </div>
        <div class="controls">
            <button class="button" onclick="prevSlide()">Previous</button>
            <button class="button" onclick="nextSlide()">Next</button>
        </div>
    </div>
    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        function showSlide(index) {
            slides[currentSlide].classList.remove('active');
            slides[index].classList.add('active');
            currentSlide = index;
        }
        function nextSlide() {
            const nextIndex = (currentSlide + 1) % slides.length;
            showSlide(nextIndex);
        }
        function prevSlide() {
            const prevIndex = (currentSlide - 1 + slides.length) % slides.length;
            showSlide(prevIndex);
        }
        document.addEventListener('keydown', function(event) {
            if (event.key === 'ArrowRight') nextSlide();
            if (event.key === 'ArrowLeft') prevSlide();
        });
    </script>
</body>
</html>
